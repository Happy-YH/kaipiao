.step{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--fin-muted);color:var(--fin-muted-foreground);font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--fin-border);font-family:var(--fin-font-mono)}
.step.is-active .step-num{background:var(--fin-gradient-tech);color:#fff;border-color:var(--fin-primary-700);box-shadow:0 0 0 3px var(--fin-tech-glow-soft),0 4px 10px rgba(6,182,212,.3)}
.step.is-done .step-num{background:var(--fin-state-success);color:#fff;border-color:var(--fin-state-success)}
.step-label{font-size:12.5px;font-weight:500;color:var(--fin-muted-foreground);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.step.is-active .step-label,.step.is-done .step-label{color:var(--fin-foreground)}
.step-line{flex:0 0 40px;height:2px;background:var(--fin-border);margin:0 8px;position:relative;overflow:hidden}
.step.is-done+.step-line{background:var(--fin-state-success)}

/* 底部确认条 */
.foot-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--fin-border);border-radius:var(--fin-radius-lg);position:sticky;bottom:0;box-shadow:var(--fin-shadow-md),0 0 0 1px rgba(6,182,212,.08)}
.foot-bar .fb-info{font-size:13px;color:var(--fin-muted-foreground);min-width:0}
.foot-bar .fb-info b{color:var(--fin-tech-600);font-weight:600}
.foot-bar .fb-actions{display:flex;gap:8px;flex-shrink:0}

/* 筛选标签页(手工开票) */
.filter-tabs{display:flex;gap:4px;padding:4px;background:var(--fin-muted);border-radius:var(--fin-radius-md);border:1px solid var(--fin-border)}
.filter-tab{height:30px;padding:0 14px;border:none;background:transparent;color:var(--fin-muted-foreground);font-size:12.5px;font-weight:500;border-radius:var(--fin-radius-sm);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;font-family:inherit}
.filter-tab:hover{color:var(--fin-tech-600)}
.filter-tab.is-active{background:var(--fin-card);color:var(--fin-tech-600);box-shadow:var(--fin-shadow-sm),0 0 0 1px rgba(6,182,212,.2)}
.filter-tab .tab-count{font-family:var(--fin-font-mono);font-size:11.5px;opacity:.8}

/* 规则盒(字段说明) */
.rules-box{background:var(--fin-muted);border:1px solid var(--fin-border);border-radius:var(--fin-radius-md);padding:14px 16px}
.rules-box .rb-title{font-size:12.5px;font-weight:600;color:var(--fin-foreground);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.rules-box ul{margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:6px}
.rules-box li{font-size:12px;color:var(--fin-muted-foreground);display:flex;align-items:baseline;gap:8px;line-height:1.5}
.rules-box li::before{content:"";width:4px;height:4px;border-radius:50%;background:var(--fin-tech-500);flex-shrink:0;transform:translateY(-2px)}
.rules-box li b{color:var(--fin-foreground);font-weight:600;margin-right:4px}

/* 汇总行 */
.summary-row{display:flex;align-items:center;gap:24px;padding:14px 18px;background:linear-gradient(90deg,rgba(6,182,212,.06),rgba(6,182,212,.02));border:1px solid rgba(6,182,212,.15);border-radius:var(--fin-radius-lg);flex-wrap:wrap}
.summary-row .sum-item{display:flex;flex-direction:column;gap:2px;min-width:0}
.summary-row .sum-label{font-size:11.5px;color:var(--fin-muted-foreground);font-weight:500;letter-spacing:.02em}
.summary-row .sum-value{font-size:18px;font-weight:700;color:var(--fin-primary-700);font-family:var(--fin-font-mono);line-height:1.1}
.summary-row .sum-value.is-tech{color:var(--fin-tech-600)}
.summary-row .sum-divider{width:1px;height:28px;background:var(--fin-border)}

/* 网格 */
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.stack-gap{display:flex;flex-direction:column;gap:14px}
.mt-3{margin-top:14px}
.mb-0{margin-bottom:0}

@media (max-width:1200px){
  .filter-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .kpi-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .desc-grid{grid-template-columns:1fr}
}
@media (max-width:768px){
  .sidebar{display:none}
  .topbar-search{display:none}
  .kpi-grid{grid-template-columns:1fr}
  .filter-grid{grid-template-columns:1fr}
  .main-content{padding:14px}
}
</style>

<script>lucide.createIcons();</script>
__PAGE_SCRIPTS__
</body>
</html>
